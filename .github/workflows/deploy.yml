name: Deploy Maya Infra Core

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_vms:
        description: "Recriar as VMs do zero? (true/false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  WSL_PROJECT_PATH: /mnt/c/Users/lucas/actions-runner/_work/projeto-starian/projeto-starian
  VBOX_PATH: C:\Program Files\Oracle\VirtualBox

jobs:
  validate:
    name: 🔍 Valida Configurações
    runs-on: self-hosted

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Valida Vagrantfile
        run: |
          cd vagrant
          vagrant validate
        shell: pwsh

      - name: Valida sintaxe Ansible
        run: |
          wsl bash -c "cd $env:WSL_PROJECT_PATH && ansible-playbook ansible/site.yml -i ansible/inventory/hosts.yml --syntax-check"
        shell: pwsh

      - name: Verifica arquivos essenciais
        run: |
          $files = @(
            "vagrant/Vagrantfile",
            "ansible/site.yml",
            "ansible/inventory/hosts.yml",
            "ansible/roles/nginx/tasks/main.yml",
            "ansible/roles/keepalived/tasks/main.yml",
            "ansible/roles/snmp/tasks/main.yml",
            "ansible/roles/scripts/tasks/main.yml",
            "ansible/roles/jboss/tasks/main.yml",
            "ansible/roles/iptables/tasks/main.yml"
          )
          foreach ($file in $files) {
            if (Test-Path $file) {
              echo "✅ $file encontrado"
            } else {
              echo "❌ $file NAO encontrado"
              exit 1
            }
          }
        shell: pwsh

  approval:
    name: ⏳ Aguarda Aprovação
    needs: validate
    runs-on: self-hosted
    environment: production

    steps:
      - name: Aprovação recebida
        run: echo "✅ Deploy aprovado! Iniciando provisionamento..."

  cleanup:
    name: 🧹 Limpeza das VMs
    needs: approval
    runs-on: self-hosted
    if: github.event.inputs.rebuild_vms == 'true'

    steps:
      - name: Para as VMs no VirtualBox
        run: |
          $env:PATH += ";$env:VBOX_PATH"
          VBoxManage controlvm vm01 poweroff 2>$null
          VBoxManage controlvm vm02 poweroff 2>$null
          VBoxManage controlvm vm03 poweroff 2>$null
          Start-Sleep -Seconds 5
        continue-on-error: true
        shell: pwsh

      - name: Remove as VMs do VirtualBox
        run: |
          $env:PATH += ";$env:VBOX_PATH"
          VBoxManage unregistervm vm01 --delete 2>$null
          VBoxManage unregistervm vm02 --delete 2>$null
          VBoxManage unregistervm vm03 --delete 2>$null
          Start-Sleep -Seconds 5
        continue-on-error: true
        shell: pwsh

      - name: Remove pastas residuais das VMs
        run: |
          Remove-Item "E:\VirtualBox-VMs\vm01" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "E:\VirtualBox-VMs\vm02" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "E:\VirtualBox-VMs\vm03" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Users\lucas\VirtualBox VMs\vm01" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Users\lucas\VirtualBox VMs\vm02" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Users\lucas\VirtualBox VMs\vm03" -Recurse -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Limpa cache do Vagrant
        run: vagrant global-status --prune
        shell: pwsh

      - name: Confirma limpeza
        run: |
          $env:PATH += ";$env:VBOX_PATH"
          echo "VMs restantes no VirtualBox:"
          VBoxManage list vms
        shell: pwsh

  provision:
    name: 🖥️ Provisiona VMs com Vagrant
    needs: cleanup
    if: always() && needs.approval.result == 'success'
    runs-on: self-hosted

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Liga VMs existentes (se rebuild=false)
        if: github.event.inputs.rebuild_vms != 'true'
        run: |
          $env:PATH += ";$env:VBOX_PATH"
          VBoxManage startvm vm01 --type headless 2>$null
          VBoxManage startvm vm02 --type headless 2>$null
          VBoxManage startvm vm03 --type headless 2>$null
          Start-Sleep -Seconds 30
        continue-on-error: true
        shell: pwsh

      - name: Cria VMs do zero (se rebuild=true)
        if: github.event.inputs.rebuild_vms == 'true'
        run: |
          cd vagrant
          vagrant up
        timeout-minutes: 30
        shell: pwsh

      - name: Verifica status das VMs
        run: |
          $env:PATH += ";$env:VBOX_PATH"
          VBoxManage list runningvms
        shell: pwsh

  configure:
    name: ⚙️ Configura com Ansible
    needs: provision
    runs-on: self-hosted

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Aguarda VMs ficarem prontas
        run: Start-Sleep -Seconds 30
        shell: pwsh

      - name: Descobre IPs das VMs e gera inventory
        run: |
          .\ansible\inventory\generate-inventory.ps1 -OutputPath "ansible/inventory/hosts.yml"
        shell: pwsh

      - name: Testa conectividade com as VMs
        run: |
          wsl bash -c "cd $env:WSL_PROJECT_PATH && ansible all -i ansible/inventory/hosts.yml -m ping"
        shell: pwsh

      - name: Roda playbook principal
        run: |
          wsl bash -c "cd $env:WSL_PROJECT_PATH && ansible-playbook ansible/site.yml -i ansible/inventory/hosts.yml -v"
        shell: pwsh

  verify:
    name: ✅ Validação Final
    needs: configure
    runs-on: self-hosted

    steps:
      - name: Testa nginx vm01
        run: wsl bash -c "curl -s http://192.168.51.11:81 | grep 'OLA MUNDO'"
        shell: pwsh

      - name: Testa nginx vm02
        run: wsl bash -c "curl -s http://192.168.51.12:81 | grep 'OLA MUNDO'"
        shell: pwsh

      - name: Testa nginx vm03
        run: wsl bash -c "curl -s http://192.168.51.13:81 | grep 'OLA MUNDO'"
        shell: pwsh

      - name: Testa VIP keepalived
        run: wsl bash -c "curl -s http://192.168.51.10:81 | grep 'OLA MUNDO'"
        shell: pwsh

      - name: Testa HTTPS
        run: wsl bash -c "curl -sk https://192.168.51.10 | grep 'OLA MUNDO'"
        shell: pwsh

      - name: Testa JBoss vm02
        run: wsl bash -c "curl -s http://192.168.51.12:9090/hello/ | grep 'Hello World'"
        shell: pwsh

      - name: Testa SNMP vm01
        run: wsl bash -c "snmpget -v2c -c public 192.168.51.11 UCD-SNMP-MIB::memTotalReal.0"
        shell: pwsh

      - name: Verifica logs sendo gerados
        run: |
          wsl bash -c "ssh -o StrictHostKeyChecking=no root@192.168.51.11 'test -f /var/log/rede.log && echo ✅ rede.log OK'"
          wsl bash -c "ssh -o StrictHostKeyChecking=no root@192.168.51.11 'test -f /var/log/teste-snmp.log && echo ✅ teste-snmp.log OK'"
        shell: pwsh

      - name: Resultado final
        run: |
          echo "========================================="
          echo "✅ Infraestrutura provisionada com sucesso!"
          echo "========================================="
          echo "vm01: 192.168.51.11"
          echo "vm02: 192.168.51.12"
          echo "vm03: 192.168.51.13"
          echo "VIP:  192.168.51.10"
          echo "URL:  http://avaliacaocore.maya.local:81"
          echo "========================================="
        shell: pwsh
